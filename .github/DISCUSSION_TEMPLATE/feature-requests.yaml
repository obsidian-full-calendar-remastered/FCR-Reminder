labels: []
body:
    - type: checkboxes
      id: no-duplicate-issues
      attributes:
      label: "Please confirm this idea is not already covered."
          options:
        - label: "I searched [Ideas in Discussions](https://github.com/obsidian-full-calendar-remastered/FCR-Reminder-Companion-App/discussions/categories/ideas) and did not find the same request."
                required: true
        - label: "I searched existing [Issues](https://github.com/obsidian-full-calendar-remastered/FCR-Reminder-Companion-App/issues) and did not find the same request."
                required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      description: Which part of the app would this change affect?
      options:
        - Windows tray/runtime
        - CLI diagnostics or lifecycle control
        - Reminder scheduling or deduplication
        - Notification UX or snooze flow
        - Host integration or /sync contract
        - Cleanup, registration, or installer behavior
        - Documentation
        - Other
    validations:
      required: true

    - type: textarea
      id: feature-description
      validations:
          required: true
      attributes:
      label: "Feature description"
      description: "Describe the capability you want to add or improve."
      placeholder: "Add ..."

    - type: textarea
      id: solution
      validations:
          required: true
      attributes:
      label: "Proposed solution"
      description: "Explain what should happen, how it would be used, and why it is worth adding."
      placeholder: "In my workflow, ..."

  - type: textarea
    id: scenario
    validations:
      required: true
    attributes:
      label: "Concrete workflow"
      description: "Describe a realistic daemon, CLI, or host-integration workflow that this feature would improve."
      placeholder: "I start the daemon, sync reminders from the host, then ..."

    - type: textarea
      id: alternatives
      validations:
          required: false
      attributes:
      label: "Alternatives considered"
      description: "Describe any workarounds, competing approaches, or reasons the current design falls short."
      placeholder: "I have considered ..."

    - type: textarea
      id: additional-context
      validations:
          required: false
      attributes:
      label: "Additional context"
      description: "Add links to docs, screenshots, mockups, payload examples, or command output if they help explain the idea."
      placeholder: "..."
