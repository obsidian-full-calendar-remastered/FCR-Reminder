name: Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: draft-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release-assets:
    name: Build ${{ matrix.platform.label }} executables
    runs-on: ${{ matrix.platform.runner }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: Windows x86_64
            runner: windows-latest
            platform_id: windows_x86_64
            extension: .exe
          - label: Linux x86_64
            runner: ubuntu-latest
            platform_id: linux_x86_64
            extension: ""

    steps:
      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        shell: bash
        run: |
          echo "This workflow must be run from the main branch."
          exit 1

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          version="$(sed -n 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          if [ -z "$version" ]; then
            echo "Unable to resolve package version from Cargo.toml" >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "tag=v$version"
            echo "platform_id=${{ matrix.platform.platform_id }}"
          } >> "$GITHUB_OUTPUT"

      - name: Install Linux build packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libayatana-appindicator3-dev

      - name: Build release binaries
        shell: bash
        run: cargo build --release --locked --bins

      - name: Package release assets
        id: package
        shell: bash
        run: |
          version="${{ steps.meta.outputs.version }}"
          platform_id="${{ matrix.platform.platform_id }}"
          extension="${{ matrix.platform.extension }}"
          dist_dir="$PWD/dist"

          mkdir -p "$dist_dir"

          daemon_source="target/release/fcr-reminder${extension}"
          cli_source="target/release/fcr-reminder-cli${extension}"
          daemon_name="fcr-reminder_v${version}_${platform_id}${extension}"
          cli_name="fcr-reminder-cli_v${version}_${platform_id}${extension}"

          for source in "$daemon_source" "$cli_source"; do
            if [ ! -f "$source" ]; then
              echo "Expected build output not found: $source" >&2
              exit 1
            fi
          done

          cp "$daemon_source" "$dist_dir/$daemon_name"
          cp "$cli_source" "$dist_dir/$cli_name"

          {
            echo "daemon_name=$daemon_name"
            echo "cli_name=$cli_name"
            echo "dist_dir=$dist_dir"
            echo "asset_paths<<EOF"
            printf '%s\n' "$dist_dir/$daemon_name" "$dist_dir/$cli_name"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload packaged executables as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries-${{ steps.meta.outputs.tag }}-${{ matrix.platform.platform_id }}
          path: dist/*
          if-no-files-found: error

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

  create-draft-release:
    name: Publish draft release
    runs-on: ubuntu-latest
    needs: build-release-assets

    steps:
      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        shell: bash
        run: |
          echo "This workflow must be run from the main branch."
          exit 1

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          version="$(sed -n 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          if [ -z "$version" ]; then
            echo "Unable to resolve package version from Cargo.toml" >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "tag=v$version"
          } >> "$GITHUB_OUTPUT"

      - name: Download packaged release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-binaries-${{ steps.meta.outputs.tag }}-*
          path: release-assets
          merge-multiple: true

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          title="FCR Reminder Companion App $tag"
          notes_path="$RUNNER_TEMP/release-notes.md"

          mapfile -t assets < <(find release-assets -maxdepth 1 -type f -printf '%f\n' | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          {
            echo "Draft release generated from \`${{ github.sha }}\` on the main branch."
            echo
            echo "Included assets:"
            for asset in "${assets[@]}"; do
              echo "- \`$asset\`"
            done
            echo
            echo "GitHub artifact attestations were generated for the packaged Windows and Linux executables in this workflow run."
          } > "$notes_path"

          if gh release view "$tag" --json isDraft --repo "${{ github.repository }}" > /dev/null 2>&1; then
            gh release edit "$tag" --draft --title "$title" --notes-file "$notes_path" --repo "${{ github.repository }}"
          else
            gh release create "$tag" --draft --target "${{ github.sha }}" --title "$title" --notes-file "$notes_path" --repo "${{ github.repository }}"
          fi

          gh release upload "$tag" release-assets/* --clobber --repo "${{ github.repository }}"
