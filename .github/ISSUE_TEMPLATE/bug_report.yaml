name: Bug Report
description: Report a problem with the FCR Reminder Companion App.
labels: ["bug"]
body:
    - type: markdown
      attributes:
          value: |
              ## Before you start
                            Please confirm you are testing the latest FCR Reminder Companion App build.

                            Helpful references before filing:
                            - Docs home: https://obsidian-full-calendar-remastered.github.io/FCR-Reminder-Companion-App/
                            - Commands and diagnostics: https://obsidian-full-calendar-remastered.github.io/FCR-Reminder-Companion-App/user/commands/
                            - Windows setup and verification: https://obsidian-full-calendar-remastered.github.io/FCR-Reminder-Companion-App/user/windows_setup/

                            If the issue appeared after an install, update, or configuration change, restart the daemon first. If the bug involves host-to-daemon sync, also restart Obsidian before reporting it.

    - type: checkboxes
      id: no-duplicate-issues
      attributes:
                    label: "Please confirm the basic checks below."
                    description: "These checks help keep reports actionable."
          options:
                            - label: "I searched existing [bug reports](https://github.com/obsidian-full-calendar-remastered/FCR-Reminder-Companion-App/issues?q=is%3Aissue%20label%3Abug) and did not find the same problem."
                                required: true
                            - label: "I reviewed the published docs and tried the relevant verification steps before opening this report."
                required: true

        - type: dropdown
            id: area
            attributes:
                    label: Problem area
                    description: Which surface is failing?
                    options:
                            - Windows tray/runtime
                            - CLI diagnostics or lifecycle commands
                            - Reminder scheduling or missed reminders
                            - Notification delivery or snooze flow
                            - Host integration or /sync payload handling
                            - Installation, build, or setup
                            - Documentation
                            - Other
            validations:
                    required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected Behavior
          description: Tell us what **should** happen.
      validations:
          required: true

    - type: textarea
      id: what-happened
      attributes:
          label: Current behavior
          description: |
              Tell us what happens instead of the expected behavior.
              Screenshots, terminal output, or notification screenshots are useful when they clarify the failure.
      validations:
          required: true

    - type: textarea
      id: reproduce
      attributes:
          label: Steps to reproduce
          description: |
              List the exact steps a developer can follow to reproduce the problem.
              Include whether you started `fcr-reminder.exe` normally, used `--debug`, or interacted through `fcr-reminder.exe`.
      validations:
          required: true

    - type: textarea
      id: diagnostics
      attributes:
          label: Diagnostic output
          description: |
              Paste any relevant command output here.

              Common commands:
              - `fcr-reminder.exe --doctor`
              - `fcr-reminder.exe --health`
              - `fcr-reminder.exe --storage`

              If the daemon fails before the CLI can connect, include the terminal output from running `fcr-reminder.exe --debug`.
      validations:
          required: true

    - type: dropdown
      id: operating-system
      attributes:
          label: Operating system
          description: The app is currently documented primarily for Windows. If you are testing something else, say so here.
          options:
              - Windows 11
              - Windows 10
              - Other or unsupported environment
      validations:
          required: true

    - type: input
      id: app-version
      attributes:
          label: FCR Reminder version or commit
          description: Release version, package version, or git commit if you built locally.
          placeholder: "Example: v0.4.0 or a1b2c3d"
      validations:
          required: true

    - type: input
      id: host-version
      attributes:
          label: Host app or Full Calendar Remastered version
          description: If this is an integration issue, include the relevant Obsidian and plugin versions. Otherwise enter N/A.
          placeholder: "Example: Obsidian 1.9.x, plugin 2.3.x, or N/A"
      validations:
          required: true

    - type: textarea
      id: environment
      attributes:
          label: Environment details
          description: |
              Include anything relevant about your setup:
              - installed release vs local build
              - normal launch vs `--debug`
              - whether the tray icon appears
              - firewall, antivirus, or policy restrictions
              - whether `/sync`, `/doctor`, or cleanup commands succeed

    - type: textarea
      id: possible-solution
      attributes:
          label: Possible solution
          description: Suggest a cause or fix if you already have one.

    - type: textarea
      id: comments
      attributes:
          label: Additional context
          description: Anything else that did not fit above.
