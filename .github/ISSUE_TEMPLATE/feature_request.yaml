      attributes:
          value: |
              ## Feature Requests have moved to Discussions
              Please [submit feature requests as Discussions](https://github.com/obsidian-full-calendar-remastered/plugin-full-calendar/discussions/categories/ideas) so that they can be voted on and prioritized.
